<div class="d-flex justify-content-center p-4">
  <div style="width:100%; max-width:700px">

    <div class="card">
      <div class="card-header">
        <h2 class="card-title text-center">Options </h2>
      </div>
      <div class="card-body">

        <div class="card inner-card mt-3">
          <div class="card-header inner-card-header">Notifications</div>
          <div class="inner-card-body">

            <div class="param-section-title">Affichage des messages</div>
            <div class="param-row">
              <span class="param-label">Durée d'affichage des messages</span>
              <div class="param-control">
                <div class="input-group w-auto">
                  <input type="number"
                         class="form-control"
                         min="0"
                         max="30"
                         step="0.5"
                         [(ngModel)]="options.flashDuration">
                  <span class="input-group-text">secondes</span>
                </div>

                <!-- TODO Griser le système ou faire un message si la durée vaut 0 -->
              </div>
            </div>

            <div class="param-row">
              <span class="param-label">Aperçu</span>
              <div class="param-control">
                <button class="btn btn-secondary btn-sm"
                        (click)="flashService.show('info', 'Ceci est un message de test !', options.flashDuration * 1000)">
                  Tester
                </button>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

    <div class="d-flex justify-content-between mt-4">
      <button class="btn btn-primary" (click)="goBack()">
        ← Retour
      </button>
      <button class="btn btn-success fw-semibold" (click)="saveDuration()">
        Sauvegarder
      </button>
    </div>

  </div>
</div>
