<div class="d-flex justify-content-center align-items-center bg-light-subtle p-5">
  <div class="card shadow-lg w-100" style="max-width: 1100px;">
    <div class="card-header text-center py-4">
      <h2 class="card-title text-center mb-0">Mes évaluations</h2>
    </div>
    <div class="card-body px-5 py-5" style="text-align: -webkit-center;">

      <!-- Slots -->
      <div class="row g-5 justify-content-center mb-2 w-100">
        @for (slot of slots; track slot.index) {
          <div class="col-md-4">

            @if (slot.data === null) {
              <!-- Slot vide -->
              <div class="card shadow-lg slot-empty slot-card d-flex align-items-center justify-content-center">
                <i class="bi bi-folder2 slot-empty-icon"></i>
                <span class="fst-italic text-muted fs-5">Vide</span>
              </div>

            } @else {
              <!-- Slot rempli -->
              <div class="card shadow-lg slot-card d-flex align-items-center justify-content-center"
                   [class.slot-filled]="selectedSlot !== slot.index"
                   [class.slot-card-selected]="selectedSlot === slot.index"
                   (click)="selectSlot(slot.index)">
                <i class="bi slot-filled-icon"
                   [class.bi-folder2-open]="selectedSlot === slot.index"
                   [class.bi-folder2]="selectedSlot !== slot.index"></i>
                <span class="fw-semibold fs-5">{{ slot.data.nomEval || 'Sans nom' }}</span>
                <span class="slot-meta">Modifié le {{ slot.data.createdAt | date:'dd/MM/yyyy' }}</span>
              </div>
            }

            <!-- Actions : modifier + télécharger + supprimer (visibles seulement si slot sélectionné) -->
            @if (slot.data !== null && selectedSlot === slot.index) {
              <div class="d-flex justify-content-center slot-actions">
                <button class="btn btn-primary fw-semibold"
                        matTooltip="Modifier"
                        matTooltipClass="custom-tooltip-class"
                        matTooltipPosition="above"
                        (click)="editSlot(slot.index)">
                  <i class="bi bi-pen"></i>
                </button>
                <button class="btn btn-primary fw-semibold"
                        matTooltip="Télécharger"
                        matTooltipClass="custom-tooltip-class"
                        matTooltipPosition="above">
                  <i class="bi bi-download"></i>
                </button>
              </div>
              <div class="d-flex justify-content-center slot-delete">
                <button class="btn btn-danger fw-semibold w-75"
                        (click)="openDeletePopup(slot)">
                  <i class="bi bi-trash me-1"></i> Supprimer
                </button>
              </div>
            } @else {
              <div class="slot-actions-placeholder"></div>
              <div class="slot-delete-placeholder"></div>
            }

          </div>
        }
      </div>

      <!-- Boutons actions -->
      <div class="d-flex align-items-start justify-content-center gap-4 flex-wrap bottom-actions">
        <div class="d-flex flex-column align-items-center gap-3">
          <div class="d-flex gap-3">
            <button class="btn btn-success fw-semibold px-4" (click)="newEval()">
              <i class="bi bi-plus-circle me-2"></i>Nouvelle évaluation
            </button>
          </div>
          <button class="btn btn-primary fw-semibold px-4" (click)="saveLastEval()">
            <i class="bi bi-floppy me-2"></i>Sauvegarder la dernière évaluation
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
