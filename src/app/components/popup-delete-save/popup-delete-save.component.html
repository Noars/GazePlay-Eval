<!-- popup-delete-save.component.html -->
<div class="popup-container">

  <!-- Header -->
  <div class="popup-header">
    <i class="bi bi-trash3-fill me-2"></i>
    Suppression de sauvegarde
  </div>

  <!-- Body -->
  <div class="popup-body">

    <!-- Alerte -->
    <div class="popup-alert">
      <i class="bi bi-exclamation-triangle-fill alert-icon"></i>
      <span>Attention, la suppression de cette évaluation est définitive.</span>
    </div>

    <!-- Bouton télécharger -->
    <button class="btn-download fw-semibold w-100" (click)="download()">
      <i class="bi bi-floppy me-2"></i>
      Télécharger mon ancienne évaluation
    </button>

    <!-- Boutons annuler / supprimer -->
    <div class="d-flex justify-content-between gap-3 mt-2">
      <button class="btn-cancel fw-semibold flex-grow-1" (click)="cancel()">
        Annuler
      </button>
      <button class="btn-delete fw-semibold flex-grow-1" (click)="delete()">
        <i class="bi bi-trash me-1"></i>
        Supprimer
      </button>
    </div>

  </div>
</div>
