<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>

  <div class="flash-container">
    @for (flash of flashService.flashs(); track flash.id) {

      <div class="alert alert-{{ mapType(flash.type) }} d-flex align-items-start justify-content-between shadow fw-semibold gap-2 mb-2"
           [class.fade-out]="flash.fadingOut">
        <div class="d-flex align-items-start gap-2">
        <i class="bi {{ mapIcon(flash.type) }} mt-1"></i>
        <span>{{ flash.message }}</span>
        </div>
        <button class="btn-close" (click)="flashService.remove(flash.id)"></button>
      </div>

    }
  </div>

</body>
</html>
