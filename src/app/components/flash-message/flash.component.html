<div class="flash-container">
    <!-- Boucle sur le signal des flashs-messages avec leur id (pour ne pas impacter tout les messages) -->
    @for (flash of flashService.flashs(); track flash.id) {

      <!-- applique la classe selon le type du message -->
      <div class="alert alert-{{ mapType(flash.type) }}"
           [class.fade-out]="flash.fadingOut">

        <div class="d-flex align-items-start gap-3">
          <i class="bi {{ mapIcon(flash.type) }} alert-icon"></i>
          <span>{{ flash.message }}</span>
        </div>

        <button class="btn-close" (click)="flashService.remove(flash.id)"></button>

      </div>

    }
</div>
