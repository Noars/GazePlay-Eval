<div
  class="offcanvas offcanvas-start"
  tabindex="-1"
  id="menu"
  aria-labelledby="menuLabel"
>
  <div class="offcanvas-header">
    <h1 class="offcanvas-title fw-semibold fs-6" id="menuLabel">Menu</h1>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
  </div>
  <div class="offcanvas-body px-3 d-flex flex-column gap-1">

    <p class="menu-section-label">Navigation</p>

    <a href="/home" class="menu-link">
      <span class="menu-icon">
        <img class="icon-light" src="assets/icons/home/home-dark.png" width="16" height="16" alt="">
        <img class="icon-dark" src="assets/icons/home/home.png" width="16" height="16" alt="">
      </span>
      <span>Accueil</span>
    </a>

    <a class="menu-link" style="cursor:pointer" (click)="goToGuide(); $event.preventDefault()">
      <span class="menu-icon">
        <img class="icon-light" src="assets/icons/book/book-dark.png" width="16" height="16" alt="">
        <img class="icon-dark" src="assets/icons/book/book.png" width="16" height="16" alt="">
      </span>
      <span>Guide</span>
    </a>

    <a class="menu-link" style="cursor:pointer" (click)="goToOptions(); $event.preventDefault()">
      <span class="menu-icon">
        <img class="icon-light" src="assets/icons/settings/settings-dark.png" width="16" height="16" alt="">
        <img class="icon-dark" src="assets/icons/settings/settings.png" width="16" height="16" alt="">
      </span>
      <span>Options</span>
    </a>

    <hr class="my-2 opacity-25">
    <p class="menu-section-label">Projet</p>

    <a class="menu-link" style="cursor:pointer" (click)="goToSauvegarde(); $event.preventDefault()">
      <span class="menu-icon">
        <img class="icon-light" src="assets/icons/save/save-dark.png" width="16" height="16" alt="">
        <img class="icon-dark" src="assets/icons/save/save.png" width="16" height="16" alt="">
      </span>
      <span>Sauvegardes</span>
    </a>

    <a class="menu-link" style="cursor:pointer" (click)="goToLoadSave(); $event.preventDefault()">
      <span class="menu-icon">
        <img class="icon-light" src="assets/icons/folder/folder-dark.png" width="16" height="16" alt="">
        <img class="icon-dark" src="assets/icons/folder/folder.png" width="16" height="16" alt="">
      </span>
      <span>Charger</span>
    </a>
    <input #fileInput type="file" accept=".gpSave,.zip" hidden>

    <a class="menu-link" style="cursor:pointer"
       data-bs-dismiss="offcanvas"
       (click)="openImportPopup(); $event.preventDefault()">
      <span class="menu-icon">
        <img class="icon-light" src="assets/icons/import/import-dark.png" width="16" height="16" alt="">
        <img class="icon-dark" src="assets/icons/import/import.png" width="16" height="16" alt="">
      </span>
      <span>Importer</span>
    </a>

  </div>
</div>
