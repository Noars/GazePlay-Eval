<div class="popup-container">

  <div class="popup-header">
    <img class="icon-light me-2" src="assets/icons/error/error-dark.png" width="16" height="16" alt="">
    <img class="icon-dark me-2" src="assets/icons/error/error.png" width="16" height="16" alt="">
    Sauvegarde en danger
  </div>

  <div class="popup-body">

    <div class="popup-alert">
      <img class="icon-light alert-icon" src="assets/icons/warning/warning-dark.png" alt="">
      <img class="icon-dark alert-icon" src="assets/icons/warning/warning.png" alt="">
      <span>
        <strong>{{ data.save.nomEval || 'Sans nom' }}</strong>
        ({{ data.slotLabel }}) va être écrasée par cette action.
      </span>
    </div>

    <span class="save-date">
      Dernière modification&nbsp;: {{ data.save.createdAt | date:'dd/MM/yyyy à HH:mm' }}
    </span>

    <button class="btn-download fw-semibold w-100" (click)="download()">
      <img class="icon-light me-2" src="assets/icons/download/download-dark.png" width="16" height="16" alt="">
      <img class="icon-dark me-2" src="assets/icons/download/download.png" width="16" height="16" alt="">
      Télécharger avant d'écraser
    </button>

    <div class="d-flex justify-content-between gap-3">
      <button class="btn-cancel fw-semibold flex-grow-1" (click)="cancel()">
        Annuler
      </button>
      <button class="btn-overwrite fw-semibold flex-shrink-1" (click)="overwrite()">
        <i class="bi bi-arrow-right me-1"></i>
        Écraser quand même
      </button>
    </div>

  </div>
</div>
