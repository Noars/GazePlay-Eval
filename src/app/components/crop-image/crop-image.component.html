<div class="popup-container">

  <!-- Header -->
  <div class="popup-header">
    Recadrer l'image
  </div>

  <!-- Body -->
  <div class="popup-body">

    <!-- Info -->
    <div class="popup-alert-info">
      <span>Utilisez les carrés pour redimensionner votre image.</span>
    </div>

    <!-- Recadrage -->
    <div class="section-block">
      <image-cropper
        #cropper
        [imageBase64]="imageToCrop"
        [cropper]="cropperPosition"
        [maintainAspectRatio]="false"
        [aspectRatio]="1"
        [imageQuality]="1"
        format="png"
        (cropperChange)="onCropperChange($event)"
        (imageCropped)="imageCropped($event)">
      </image-cropper>

      <div class="mt-2 d-flex gap-3 align-items-center justify-content-center">
        <label>Hauteur :</label>
        <input type="number" class="form-control w-25" [max]="imageMaxHeight - cropHeightY1" [(ngModel)]="cropHeightSize" (ngModelChange)="changeHeightCropper($event)">
        <label>Largeur :</label>
        <input type="number" class="form-control w-25" [max]="imageMaxWidth - cropWidthX1" [(ngModel)]="cropWidthSize" (ngModelChange)="changeWidthCropper($event)">
      </div>

    </div>

    <!-- Boutons -->
    <div class="d-flex justify-content-between gap-3 mt-2">
      <button class="btn-cancel fw-semibold flex-grow-1" (click)="cancelCrop()">Annuler</button>
      <button class="btn-confirm fw-semibold flex-grow-1" (click)="validateCrop()">Recadrer l'image</button>
    </div>

  </div>
</div>
