<div class="card shadow-lg w-100">
  <div class="card-header bg-secondary text-white fw-semibold">
    <h2 class="card-title text-center">Crop Image</h2>
  </div>
  <div class="card-body" style="text-align: -webkit-center;">
    <div class="crop-container">
      <image-cropper
        #cropper
        [imageBase64]="imageToCrop"
        [cropper]="cropperPosition"
        [maintainAspectRatio]="false"
        [aspectRatio]="1"
        [imageQuality]="1"
        format="png"
        (cropperChange)="onCropperChange($event)"
        (imageCropped)="imageCropped($event)">
      </image-cropper>

      <div class="mt-2 d-flex gap-3 align-items-center justify-content-center">
        <label>Hauteur :</label>
        <input type="number" class="form-control w-25" [max]="imageMaxHeight - cropHeightY1" [(ngModel)]="cropHeightSize" (ngModelChange)="changeHeightCropper($event)">
        <label>Largeur :</label>
        <input type="number" class="form-control w-25" [max]="imageMaxWidth - cropWidthX1" [(ngModel)]="cropWidthSize" (ngModelChange)="changeWidthCropper($event)">
      </div>

      <div class="crop-buttons mt-3">
        <button class="btn btn-success fw-semibold me-2" (click)="validateCrop()">Valider</button>
        <button class="btn btn-danger fw-semibold" (click)="cancelCrop()">Annuler</button>
      </div>
    </div>
  </div>
</div>
