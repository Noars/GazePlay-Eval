<div class="card shadow-lg w-100">
  <div class="card-header bg-secondary text-white fw-semibold">
    <h2 class="card-title text-center">Crop Image</h2>
  </div>
  <div class="card-body" style="text-align: -webkit-center;">
    <div class="crop-container">
      <image-cropper
        [imageBase64]="imageToCrop"
        [maintainAspectRatio]="true"
        [aspectRatio]="1"
        [resizeToWidth]="500"
        [cropperMinWidth]="500"
        [cropperMinHeight]="500"
        [cropperMaxWidth]="1000"
        [cropperMaxHeight]="1000"
        [imageQuality]="1"
        format="png"
        (imageCropped)="imageCropped($event)">
      </image-cropper>

      <div class="crop-buttons mt-3">
        <button class="btn btn-success fw-semibold me-2" (click)="validateCrop()">Valider</button>
        <button class="btn btn-danger fw-semibold" (click)="cancelCrop()">Annuler</button>
      </div>
    </div>
  </div>
</div>
