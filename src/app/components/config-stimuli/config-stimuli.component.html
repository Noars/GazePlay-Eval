<div
  class="offcanvas offcanvas-start custom-offcanvas"
  data-bs-backdrop="false"
  data-bs-scroll="true"
  tabindex="-1"
  id="configStimuli"
  aria-labelledby="configStimuliLabel"
>
  <div class="offcanvas-header">
    <h1 class="offcanvas-title" id="configStimuliLabel">Case n° {{ data.cell + 1 }}</h1>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
  </div>

  <div class="resize-handle" (mousedown)="startResize($event)"></div>

  <div class="offcanvas-body">

    <!-- Bonne réponse -->
    <div class="section-block">
      <label class="section-label">Bonne réponse ?</label>
      <div class="answer-selector">
        <label class="answer-option" [class.answer-yes]="data.screen[data.cell].goodAnswer === true">
          <input type="radio" name="goodAnswer" [value]="true" [(ngModel)]="data.screen[this.data.cell].goodAnswer" hidden>
          Oui
        </label>
        <label class="answer-option" [class.answer-no]="data.screen[data.cell].goodAnswer === false">
          <input type="radio" name="goodAnswer" [value]="false" [(ngModel)]="data.screen[this.data.cell].goodAnswer" hidden>
          Non
        </label>
      </div>
    </div>

    <!-- Image -->
    <div class="section-block">
      <label class="section-label">Image</label>
      <label class="file-upload-btn">
        {{ data.screen[data.cell].imageName || 'Choisir une image' }}
        <input #fileInputImage type="file" accept="image/*" hidden (change)="getImageFile($event)">
      </label>
      @if (previewImage) {
        <div class="media-preview">
          <img [src]="previewImage" class="img-preview" alt="Aperçu image">
          <button class="btn-crop" (click)="cropImage()">Recadrer</button>
        </div>
      }
    </div>

    <!-- Son -->
    <div class="section-block">
      <label class="section-label">Son</label>
      <label class="file-upload-btn">
        {{ data.screen[data.cell].soundName || 'Choisir un son' }}
        <input #fileInputSound type="file" accept="audio/*" hidden (change)="getSoundFile($event)">
      </label>
      @if (previewSound) {
        <div class="media-preview">
          <audio controls [attr.src]="previewSound"></audio>
        </div>
      }
    </div>

    <!-- Actions -->
    <div class="actions-footer">
      <button class="btn-action btn btn-danger fw-semibold" (click)="deleteCell()">Supprimer</button>
      <button class="btn-action btn-validate" data-bs-dismiss="offcanvas" (click)="saveProgress()" aria-label="Valider">Valider</button>
    </div>

  </div>
</div>
